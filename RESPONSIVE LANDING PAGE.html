<!DOCTYPE html>
<html>
<head>

  <title>Landing Page</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial;
    }

    header{
      background:blue;
      color:white;
      padding:40px;
      text-align:center;
    }

    .container{
      display:flex;
      justify-content:space-around;
      flex-wrap:wrap;
      padding:30px;
    }

    .box{
      background:#f4f4f4;
      padding:20px;
      width:250px;
      margin:10px;
      border-radius:10px;
      text-align:center;
    }

    footer{
      background:#222;
      color:white;
      text-align:center;
      padding:20px;
    }

  </style>

</head>

<body>

<header>

  <h1>Tech Startup</h1>

  <p>Build Your Future With Technology</p>

</header>

<div class="container">

  <div class="box">

    <h2>Fast</h2>

    <p>High speed performance.</p>

  </div>

  <div class="box">

    <h2>Secure</h2>

    <p>Advanced security features.</p>

  </div>

  <div class="box">

    <h2>Responsive</h2>

    <p>Works on all devices.</p>

  </div>

</div>

<footer>

  <p>© 2026 Tech Startup</p>

</footer>

</body>
</html>
